<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canoe Trip RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Forest & River Palette */
            --bg-forest: #0d2b18;
            --bg-river: #05182d;
            --text-cyan: #00e5ff; 
            --highlight-green: #2ecc71; 
            --border-teal: #117864;
        }

        body {
            /* Gradient background transitioning from deep green to deep blue */
            background: linear-gradient(135deg, var(--bg-forest) 0%, var(--bg-river) 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
            min-height: 100vh;
            margin: 0;
        }

        h1, h2 {
            color: var(--text-cyan);
            text-shadow: 2px 2px 0px black;
            margin-bottom: 20px;
        }

        h1 { font-size: 2rem; }
        h2 { font-size: 1rem; margin-top: 40px; }

        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 4px solid var(--border-teal);
            padding: 30px;
            background-color: rgba(0, 0, 0, 0.6); 
            box-shadow: 10px 10px 0px black;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Selectable Cards */
        .card {
            border: 3px dashed var(--border-teal);
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            width: 200px;
            background-color: #081410; 
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-bottom: 2px solid var(--border-teal);
            margin-bottom: 10px;
        }

        .card:hover {
            border-color: var(--text-cyan);
            transform: scale(1.05);
        }

        .card.active {
            border: 4px solid var(--highlight-green);
            background-color: #0b221d;
            box-shadow: 0 0 15px var(--highlight-green);
        }

        .card h3 { font-size: 0.8rem; color: var(--highlight-green); }
        .card p { font-size: 0.6rem; color: #b3d4c6; }

        /* Inputs & Buttons */
        input[type="text"] {
            font-family: 'Press Start 2P', cursive;
            background: black;
            color: var(--text-cyan);
            border: 3px solid var(--border-teal);
            padding: 15px;
            font-size: 1rem;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--highlight-green);
            box-shadow: 0 0 10px var(--highlight-green);
        }

        .start-btn {
            margin-top: 40px;
            background-color: var(--border-teal);
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            padding: 15px 30px;
            border: 4px solid var(--highlight-green);
            cursor: pointer;
            box-shadow: 5px 5px 0px black;
            transition: 0.1s;
        }

        .start-btn:hover {
            background-color: var(--highlight-green);
            color: black;
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px black;
        }

        .start-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px black;
        }
    </style>
</head>
<body>

    <div class="container" id="selection-screen">
        <h1>🌲 RIVER QUEST 🌊</h1>

        <h2>1. ENTER EXPLORER NAME</h2>
        <input type="text" id="playerName" placeholder="e.g. River King" required>

        <h2>2. CHOOSE YOUR VESSEL</h2>
        <div class="grid" id="boatSelection">
            <div class="card boat-card" data-value="Crimson Cruiser">
                <img src="kanoe-roto-viking.png" alt="Red Canoe">
                <h3>Crimson Cruiser</h3>
                <p>Class: Heavy Canoe</p>
                <p>Capacity: 3 Explorers</p>
            </div>
            <div class="card boat-card" data-value="Orange Outlaw">
                <img src="kajak-vista.png" alt="Orange Kayak">
                <h3>Orange Outlaw</h3>
                <p>Class: Rapid Kayak</p>
                <p>Capacity: 2 Explorers</p>
            </div>
        </div>

        <h2>3. SELECT DIFFICULTY</h2>
        <div class="grid" id="difficultySelection">
            <div class="card diff-card" data-value="EASY">
                <h3>EASY 🦆</h3>
                <p>Lazy River Float</p>
            </div>
            <div class="card diff-card" data-value="NORMAL">
                <h3>NORMAL 🛶</h3>
                <p>Steady Paddling</p>
            </div>
            <div class="card diff-card" data-value="HARDCORE">
                <h3>HARDCORE 🌊</h3>
                <p>White Water Rush</p>
            </div>
        </div>

        <button class="start-btn" onclick="submitRSVP()">LAUNCH EXPEDITION</button>
    </div>

    <script>
        let selectedBoat = null;
        let selectedDifficulty = null;

        function setupSelection(cardClass, callback) {
            const cards = document.querySelectorAll(cardClass);
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    cards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    callback(card.getAttribute('data-value'));
                });
            });
        }

        setupSelection('.boat-card', (val) => selectedBoat = val);
        setupSelection('.diff-card', (val) => selectedDifficulty = val);

        function submitRSVP() {
            const playerName = document.getElementById('playerName').value.trim();

            if (!playerName) return alert("ERROR: Explorer Name required!");
            if (!selectedBoat) return alert("ERROR: Please select a vessel!");
            if (!selectedDifficulty) return alert("ERROR: Please select a difficulty level!");

            // Redirects to success.html and passes the choices in the URL
            const urlParams = `?name=${encodeURIComponent(playerName)}&boat=${encodeURIComponent(selectedBoat)}&diff=${encodeURIComponent(selectedDifficulty)}`;
            window.location.href = 'success.html' + urlParams;
        }
    </script>
</body>
</html>
