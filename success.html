<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Joined!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e94560;
            --border-color: #e94560;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            padding: 20px;
            line-height: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            padding: 50px 30px;
            background-color: rgba(0,0,0,0.5);
            box-shadow: 10px 10px 0px black;
        }

        h1 {
            color: #4ecca3;
            text-shadow: 2px 2px 0px black;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        p {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        .highlight {
            color: #4ecca3;
        }

        .back-btn {
            margin-top: 40px;
            display: inline-block;
            background-color: var(--text-color);
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            padding: 15px 25px;
            border: 4px solid white;
            cursor: pointer;
            box-shadow: 5px 5px 0px black;
            transition: 0.1s;
            text-decoration: none;
        }

        .back-btn:hover {
            background-color: #ff2a4b;
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px black;
        }

        .back-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px black;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LOBBY JOINED!</h1>
        <p class="highlight">Your RSVP has been received.</p>
        <p>See you on the water, adventurer.</p>
        <p>Prepare your gear and await further instructions.</p>
        <a href="/" class="back-btn">BACK TO START</a>
    </div>
</body>
</html>
